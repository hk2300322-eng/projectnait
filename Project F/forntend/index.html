<!DOCTYPE html>
<html>
<head>
    <title>HTML Form Example</title>
</head>
<body>

    <h2>Registration Form</h2>

    <form action="#" method="post">

        <!-- Name -->
        <label>Full Name:</label><br>
        <input type="text" name="fullname" placeholder="Enter your name"><br><br>

        <!-- Email -->
        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter your email"><br><br>

        <!-- Password -->
        <label>Password:</label><br>
        <input type="password" name="password" placeholder="Enter password"><br><br>

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female<br><br>

        <!-- Hobbies -->
        <label>Hobbies:</label><br>
        <input type="checkbox" name="hobby" value="Reading"> Reading
        <input type="checkbox" name="hobby" value="Gaming"> Gaming
        <input type="checkbox" name="hobby" value="Sports"> Sports<br><br>

        <!-- City -->
        <label>City:</label><br>
        <select name="city">
            <option>Raipur</option>
            <option>Delhi</option>
            <option>Mumbai</option>
        </select><br><br>

        <!-- Message -->
        <label>Message:</label><br>
        <textarea name="message" rows="4" cols="30"></textarea><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit">

    </form>

</body>
</html>
